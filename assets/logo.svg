<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a252f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Shield shape -->
  <path d="M100 10 L185 50 L185 120 Q185 180 100 210 Q15 180 15 120 L15 50 Z" fill="url(#shieldGrad)" stroke="#a93226" stroke-width="2"/>
  <path d="M100 25 L172 58 L172 118 Q172 170 100 197 Q28 170 28 118 L28 58 Z" fill="url(#innerGrad)"/>
  <!-- Warning triangle -->
  <path d="M100 65 L140 135 L60 135 Z" fill="none" stroke="#e74c3c" stroke-width="4" stroke-linejoin="round"/>
  <!-- Exclamation mark -->
  <line x1="100" y1="82" x2="100" y2="112" stroke="#e74c3c" stroke-width="5" stroke-linecap="round"/>
  <circle cx="100" cy="125" r="3.5" fill="#e74c3c"/>
  <!-- Gear teeth around warning -->
  <g stroke="#e67e22" stroke-width="2.5" fill="none" opacity="0.7">
    <line x1="100" y1="52" x2="100" y2="58"/>
    <line x1="100" y1="142" x2="100" y2="148"/>
    <line x1="52" y1="100" x2="58" y2="100"/>
    <line x1="142" y1="100" x2="148" y2="100"/>
    <line x1="66" y1="66" x2="70" y2="70"/>
    <line x1="130" y1="130" x2="134" y2="134"/>
    <line x1="134" y1="66" x2="130" y2="70"/>
    <line x1="70" y1="130" x2="66" y2="134"/>
  </g>
  <!-- Small broken lock icon bottom -->
  <g transform="translate(85, 155)" fill="#95a5a6" opacity="0.6">
    <rect x="2" y="8" width="26" height="18" rx="2" fill="none" stroke="#95a5a6" stroke-width="1.5"/>
    <path d="M8 8 V5 Q8 0 15 0 Q22 0 22 5" fill="none" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>
</svg>
